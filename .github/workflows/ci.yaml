name: ci

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-slim, arch: x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64 }

    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.arch }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # clipbender links libwayland-client (both binaries) and libxkbcommon (client).
      # `sudo` may be absent on slim images; fall back to running apt directly.
      - name: Install system dependencies
        run: |
          SUDO="$(command -v sudo || true)"
          $SUDO apt-get update
          $SUDO apt-get install -y libwayland-dev libxkbcommon-dev

      # Install prebuilt odin + odinfmt binaries (no building from source).
      - name: Set up Odin toolchain
        env:
          ODIN_RELEASE: dev-2026-04
          OLS_RELEASE: dev-2026-05
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            aarch64|arm64) odin_arch=arm64;  ols_arch=arm64 ;;
            *)             odin_arch=amd64;  ols_arch=x86_64 ;;
          esac
          mkdir -p "$HOME/.local/bin"

          # odin (release tarball ships the `odin` binary + core/vendor)
          curl -fsSL -o /tmp/odin.tar.gz \
            "https://github.com/odin-lang/Odin/releases/download/${ODIN_RELEASE}/odin-linux-${odin_arch}-${ODIN_RELEASE}.tar.gz"
          mkdir -p "$HOME/odin" && tar -xzf /tmp/odin.tar.gz -C "$HOME/odin" --strip-components=1
          ln -sf "$HOME/odin/odin" "$HOME/.local/bin/odin"

          # odinfmt (bundled in the OLS release zip)
          curl -fsSL -o /tmp/ols.zip \
            "https://github.com/DanielGavin/ols/releases/download/${OLS_RELEASE}/ols-${ols_arch}-unknown-linux-gnu.zip"
          unzip -o /tmp/ols.zip -d /tmp/ols
          install -Dm755 "/tmp/ols/odinfmt-${ols_arch}-unknown-linux-gnu" "$HOME/.local/bin/odinfmt"

          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      # Formatting is arch-independent; only check it once (on x86_64).
      - name: Check formatting
        if: matrix.arch == 'x86_64'
        run: |
          odinfmt -w src
          git diff --exit-code -- src || {
            echo "::error::Code is not formatted. Run 'odinfmt -w src' and commit the result.";
            exit 1;
          }

      - name: Build
        run: ./build.sh release

      - name: Test
        run: ./build.sh test
