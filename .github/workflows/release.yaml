name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { runner: ubuntu-slim, arch: x86_64 }
          - { runner: ubuntu-24.04-arm, arch: aarch64 }

    runs-on: ${{ matrix.runner }}
    name: package ${{ matrix.arch }}-linux
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # clang: Odin's linker/codegen backend. libwayland/libxkbcommon: linked by clipbender.
      - name: Install system dependencies
        run: |
          SUDO="$(command -v sudo || true)"
          $SUDO apt-get update
          $SUDO apt-get install -y clang libwayland-dev libxkbcommon-dev

      # Install prebuilt odin binary (no building from source). odinfmt is not
      # needed here since the release workflow doesn't run the format gate.
      - name: Set up Odin
        env:
          ODIN_RELEASE: dev-2026-04
        run: |
          set -euo pipefail
          case "$(uname -m)" in
            aarch64|arm64) odin_arch=arm64 ;;
            *)             odin_arch=amd64 ;;
          esac
          curl -fsSL -o /tmp/odin.tar.gz \
            "https://github.com/odin-lang/Odin/releases/download/${ODIN_RELEASE}/odin-linux-${odin_arch}-${ODIN_RELEASE}.tar.gz"
          mkdir -p "$HOME/odin" && tar -xzf /tmp/odin.tar.gz -C "$HOME/odin" --strip-components=1
          mkdir -p "$HOME/.local/bin"
          ln -sf "$HOME/odin/odin" "$HOME/.local/bin/odin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Build
        run: ./build.sh release

      - name: Package
        run: |
          version="${GITHUB_REF_NAME}"
          stage="clipbender-${version}-${{ matrix.arch }}-linux"
          mkdir -p "$stage"
          # Binaries
          cp build/clipbenderd build/clipbender "$stage/"
          # Packaging artifacts (systemd unit, shell completions)
          cp -r packaging "$stage/"
          # Docs
          cp README.md LICENSE "$stage/" 2>/dev/null || true
          tar -czf "${stage}.tar.gz" "$stage"
          sha256sum "${stage}.tar.gz" > "${stage}.tar.gz.sha256"

      - name: Upload
        uses: softprops/action-gh-release@v2
        with:
          files: |
            clipbender-*-${{ matrix.arch }}-linux.tar.gz
            clipbender-*-${{ matrix.arch }}-linux.tar.gz.sha256
